<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Cup Generator | Buat Bagan Turnamen Mabar</title>
    <meta name="description" content="Alat otomatis pembuat bagan turnamen (sistem gugur) untuk komunitas eFootball. Atur bagan, peserta, 2 Leg, dan Juara 3 dengan mudah dan cepat.">
    <meta name="keywords" content="efootbal cup generator, cup generator, efootbal generator, cup efootball, cara buat cup di efootball">
    <meta name="author" content="Farhan Fdlhq">

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://e-football-cup-generator.vercel.app/">
    <meta property="og:title" content="eFootball Cup Generator | Buat Bagan Turnamen Mabar">
    <meta property="og:description" content="Alat pembuat bagan turnamen (sistem gugur) untuk komunitas eFootball. Atur bagan mabar dengan mudah dan interaktif.">
    <!-- Gambar preview (disarankan format JPG/PNG dengan resolusi 1200x630) -->
    <meta property="og:image" content="https://e-football-cup-generator.vercel.app/preview.png?v=2">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://e-football-cup-generator.vercel.app/">
    <meta property="twitter:title" content="eFootball Cup Generator | Buat Bagan Turnamen Mabar">
    <meta property="twitter:description" content="Alat pembuat bagan turnamen (sistem gugur) untuk komunitas eFootball. Atur bagan mabar dengan mudah dan interaktif.">
    <meta property="twitter:image" content="https://e-football-cup-generator.vercel.app/preview.png?v=2">
    <link rel="icon" type="image/svg+xml" href="EFootball_colored_logo.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="lang-switch">
                <button id="lang-id" class="active">ID</button>
                <button id="lang-en">EN</button>
            </div>
            <img src="EFootball_logo_-_alternative_colored_version.svg" alt="eFootball Logo" class="main-logo">
            <h1>Cup Generator</h1>
            <p data-i18n="desc">Buat bagan turnamen mabarmu dengan mudah</p>
        </header>

        <main>
            <section class="setup-section glass-panel">
                <div class="form-group">
                    <label for="tournamentFormat" data-i18n="format_label">Format Turnamen</label>
                    <select id="tournamentFormat" class="format-input">
                        <option value="knockout" data-i18n="format_knockout">Sistem Gugur (Knockout)</option>
                        <option value="league" data-i18n="format_league">Klasemen Liga (Round Robin)</option>
                        <option value="group" data-i18n="format_group">Fase Grup + Knockout</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="numParticipants" data-i18n="num_participants">Jumlah Peserta</label>
                    <input type="number" id="numParticipants" min="3" value="4" class="num-input">
                </div>

                <div class="participants-container">
                    <h3 data-i18n="participant_names">Nama Peserta / Tim</h3>
                    <p class="subtitle" data-i18n="type_names">Ketik nama peserta</p>
                    <div id="participantInputs" class="inputs-grid">
                        <!-- Inputs generated by JS -->
                    </div>
                </div>

                <div class="actions">
                    <div class="extra-options" style="display: flex; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; justify-content: center;">
                        <label class="checkbox-label" style="font-size: 1rem;">
                            <input type="checkbox" id="twoLegCheckbox">
                            <span data-i18n="two_leg">2 Leg (Kandang-Tandang)</span>
                        </label>
                        <label class="checkbox-label" style="font-size: 1rem;">
                            <input type="checkbox" id="thirdPlaceCheckbox">
                            <span data-i18n="third_place">Perebutan Juara 3</span>
                        </label>
                        <label class="checkbox-label" style="font-size: 1rem;">
                            <input type="checkbox" id="shuffleCheckbox" checked>
                            <span data-i18n="shuffle">Acak Posisi</span>
                        </label>
                    </div>
                    <button id="generateBtn" class="btn-primary" data-i18n="generate">Generate Bagan</button>
                </div>
            </section>

            <section class="bracket-section" id="bracketSection" style="display: none;">
                <div class="bracket-header">
                    <h2 data-i18n="bracket_title">Bagan Turnamen</h2>
                    <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; justify-content: center;">
                        <button id="exportBracketBtn" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.9rem;" data-i18n="export_btn">📸 Download</button>
                        <div class="zoom-controls">
                            <button id="zoomOutBtn" title="Zoom Out">-</button>
                            <span id="zoomLevel">100%</span>
                            <button id="zoomInBtn" title="Zoom In">+</button>
                        </div>
                    </div>
                </div>
                <div class="bracket-wrapper" id="bracketWrapper">
                    <!-- Bracket generated by JS -->
                </div>
            </section>

            <section class="league-section" id="leagueSection" style="display: none; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--glass-border);">
                <div class="bracket-header">
                    <h2 data-i18n="standings_title" style="text-align: center; color: var(--gold); font-size: 2rem; margin-bottom: 1rem;">Klasemen Liga</h2>
                    <button id="exportLeagueBtn" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.9rem; margin-bottom: 1rem;" data-i18n="export_btn">📸 Download</button>
                </div>
                
                <div class="table-responsive glass-panel" style="margin-bottom: 3rem; padding: 1rem; overflow-x: auto;">
                    <table class="standings-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th style="text-align: left;" data-i18n="team">Tim</th>
                                <th title="Main" data-i18n="played">P</th>
                                <th title="Menang" data-i18n="won">W</th>
                                <th title="Seri" data-i18n="drawn">D</th>
                                <th title="Kalah" data-i18n="lost">L</th>
                                <th title="Gol Memasukkan" data-i18n="gf">GF</th>
                                <th title="Gol Kemasukan" data-i18n="ga">GA</th>
                                <th title="Selisih Gol" data-i18n="gd">GD</th>
                                <th title="Poin" data-i18n="pts">Pts</th>
                            </tr>
                        </thead>
                        <tbody id="standingsBody">
                            <!-- Generated by JS -->
                        </tbody>
                    </table>
                </div>

                <div class="bracket-header">
                    <h2 data-i18n="fixtures_title" style="text-align: center; color: var(--gold); font-size: 2rem; margin-bottom: 2rem;">Jadwal Pertandingan</h2>
                </div>
                
                <div id="fixturesContainer" class="fixtures-grid">
                    <!-- Generated by JS -->
                </div>
            </section>

            <section class="group-section" id="groupSection" style="display: none; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--glass-border);">
                <div class="bracket-header">
                    <h2 data-i18n="group_title" style="text-align: center; color: var(--gold); font-size: 2rem; margin-bottom: 1rem;">Fase Grup</h2>
                    <button id="advanceToKnockoutBtn" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 1rem; margin-bottom: 1rem; background: var(--gold); color: var(--navy); border: none;" data-i18n="advance_knockout">🏆 Lanjut ke Knockout</button>
                </div>
                
                <div id="groupsContainer" style="display: flex; flex-direction: column; gap: 3rem;">
                    <!-- Groups generated by JS -->
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
